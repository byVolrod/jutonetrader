<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #141414;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;

    }
    img { height: 48px; margin-bottom: 40px; mix-blend-mode: screen; filter: contrast(1.8) brightness(1.15); }
    .code {
      font-size: 96px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(90deg, #d4af37, #fef08a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: rgba(255,255,255,0.55); max-width: 360px; line-height: 1.6; margin-bottom: 36px; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #d4af37, #e8c94a);
      color: #0a0a0f;
      font-weight: 800;
      font-size: 14px;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      transition: box-shadow 0.2s;
    }
    a:hover { box-shadow: 0 0 40px rgba(212,175,55,0.4); }

</head>
